<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desbloquear Conteúdo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(270deg,#000000,#1a0000,#330000,#000000);
  background-size:800% 800%;
  animation:bg 12s ease infinite;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

@keyframes bg{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.card{
  width:370px;
  backdrop-filter:blur(10px);
  background:rgba(20,0,0,0.7);
  padding:40px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.9);
  border:1px solid rgba(255,0,0,0.2);
  animation:fade 1s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(30px)}
  to{opacity:1;transform:translateY(0)}
}

h1{
  font-size:24px;
  color:#ff1a1a;
  margin-bottom:10px;
}

p{
  font-size:14px;
  color:#ccc;
  margin-bottom:25px;
}

#progress{
  height:6px;
  background:#330000;
  border-radius:10px;
  overflow:hidden;
  margin-bottom:20px;
}

#bar{
  height:100%;
  width:0;
  background:linear-gradient(90deg,#ff0000,#ff4d4d);
  transition:.4s;
}

.btn{
  width:100%;
  padding:14px;
  border-radius:12px;
  margin-bottom:12px;
  font-size:15px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  text-decoration:none;
  color:#fff;
  transition:.3s;
  background:linear-gradient(90deg,#8b0000,#ff0000);
}

.btn:hover{
  transform:translateY(-3px) scale(1.02);
  box-shadow:0 10px 25px rgba(255,0,0,.3);
}

.done{
  background:linear-gradient(90deg,#00c853,#22c55e) !important;
  color:#000 !important;
  box-shadow:0 0 15px rgba(34,197,94,.6);
  animation:pop .3s ease;
}

@keyframes pop{
  from{transform:scale(0.9)}
  to{transform:scale(1)}
}

#liberado{
  display:none;
  margin-top:20px;
  animation:fade 0.8s ease;
}

#liberado a{
  display:inline-block;
  background:linear-gradient(90deg,#00c853,#22c55e);
  color:#000;
  padding:14px 20px;
  border-radius:12px;
  text-decoration:none;
  font-weight:600;
  margin-top:10px;
  transition:.3s;
}

#liberado a:hover{
  transform:scale(1.08);
}
</style>
</head>

<body>

<div class="card">
  <h1>🔥 Desbloqueie o Conteúdo 🔓</h1>
  <p>Complete todas as etapas abaixo</p>

  <div id="progress"><div id="bar"></div></div>

  <a id="b1" class="btn" href="https://www.youtube.com/@isacmodstv" target="_blank" onclick="marcar('b1')">
    📺 Inscrever-se no Canal Principal
  </a>

  <a id="b2" class="btn" href="https://www.youtube.com/@isacmodstv2" target="_blank" onclick="marcar('b2')">
    📺 Inscrever-se no Canal Secundário
  </a>

  <a id="b3" class="btn" href="https://youtu.be/CM73yKo_2dQ?si=vGTCI4cA07y0tIQK" target="_blank" onclick="marcar('b3')">
    👍 Curtir o Vídeo
  </a>

  <a id="b4" class="btn" href="https://youtu.be/CM73yKo_2dQ?si=vGTCI4cA07y0tIQK" target="_blank" onclick="marcar('b4')">
    💬 Comentar no Vídeo
  </a>

  <a id="b5" class="btn" href="https://youtu.be/ucw5RrGjIJs?si=Uc6nPa6G1q532EHf" target="_blank" onclick="marcar('b5')">
    ❤️ Like no Novo Vídeo
  </a>

  <a id="b6" class="btn" href="https://chat.whatsapp.com/Bye9CWnyog5CggS0y6RxXA" target="_blank" onclick="marcar('b6')">
    🟢 Entrar no Grupo WhatsApp
  </a>

  <div id="liberado">
    <p>✅ Acesso liberado com sucesso</p>
    <a href="https://suaads.com/sjl2g1" target="_blank">
      🚀 ACESSAR AGORA
    </a>
  </div>
</div>

<script>
let total = 0;
const max = 6;

function atualizar(){
  document.getElementById('bar').style.width = (total*(100/max))+'%';

  if(total === max){
    setTimeout(()=>{
      document.getElementById('liberado').style.display = 'block';
    }, 600);
  }
}

function marcar(id){
  const el = document.getElementById(id);

  if(!el.classList.contains('done')){
    total++;
    el.classList.add('done');
    atualizar();
  }
}
</script>

</body>
</html>
